server.port=${PORT:8080}

# --- DATABASE CONFIG (Důng PostgreSQL cho Render) ---
# Ch? nŕy không ???c ?? localhost n?a, ph?i důng bi?n ?? Render ?i?n link th?c
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Quan tr?ng: ??i Dialect sang PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- SERVER CONFIG ---
server.tomcat.max-http-form-post-size=2MB
server.tomcat.threads.max=50

# --- LOGGING ---
logging.level.root=INFO
logging.level.com.khanh.teashop.khanhs_tea_bot=INFO

# --- TELEGRAM BOT ---
telegram.bot.username=khanhs_tea_bot
telegram.bot.token=${TELEGRAM_BOT_TOKEN}

# --- AI GEMINI ---
gemini.api-key=${GEMINI_API_KEY}
gemini.model=gemini-2.0-flash
gemini.embedding-model=gemini-embedding-001

# --- QDRANT (VECTOR DB) ---
qdrant.url=${QDRANT_URL}
qdrant.api-key=${QDRANT_API_KEY}
qdrant.collection=tea_menu_knowledge_v2
qdrant.vector-size=3072

# --- PAYOS (C?p nh?t link Render thay cho ngrok) ---
payos.base-url=https://api-merchant.payos.vn
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}
# Ch? nŕy Khánh nh? ??i 'khanhs-tea-bot' thŕnh ?úng tęn App c?a b?n tręn Render nhé
payos.return-url=https://khanhs-tea-bot.onrender.com/payment/success
payos.cancel-url=https://khanhs-tea-bot.onrender.com/payment/cancel